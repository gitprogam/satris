<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사트리스</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="settings-panel" class="hidden">
      <h2>설정 <span class="hint">(Tab으로 열고 닫기)</span></h2>
      <label>
        DAS <span class="hint">(Delayed Auto Shift, ms)</span>
        <input type="number" id="set-das" min="0" max="500" step="1" />
      </label>
      <label>
        ARR <span class="hint">(Auto Repeat Rate, ms)</span>
        <input type="number" id="set-arr" min="0" max="100" step="0.5" />
      </label>
      <label>
        SDF <span class="hint">(Soft Drop Factor, 5~41, 41=즉시)</span>
        <input type="number" id="set-sdf" min="5" max="41" step="1" />
      </label>
      <label>
        DCD <span class="hint">(DAS Cut Delay, ms)</span>
        <input type="number" id="set-dcd" min="0" max="300" step="1" />
      </label>
      <div class="settings-actions">
        <button id="settings-reset" type="button">기본값으로</button>
        <button id="settings-close" type="button">닫기</button>
      </div>
    </div>

    <div id="menu-screen" class="overlay-screen">
      <h1>사트리스</h1>
      <div class="menu-actions">
        <button id="menu-single" type="button">싱글플레이</button>
        <button id="menu-pvp" type="button">PvP 대전</button>
        <button id="menu-duo" type="button">2v2 대전</button>
      </div>
    </div>

    <div id="pvp-lobby" class="overlay-screen hidden">
      <h2>PvP 대전</h2>
      <label>
        서버 주소
        <input type="text" id="pvp-server-url" />
      </label>
      <div class="lobby-section">
        <button id="pvp-create" type="button">방 만들기</button>
        <p id="pvp-room-code"></p>
      </div>
      <div class="lobby-section lobby-join">
        <input type="text" id="pvp-code-input" placeholder="방 코드 입력" maxlength="5" />
        <button id="pvp-join" type="button">참가하기</button>
      </div>
      <p id="pvp-status" class="pvp-status"></p>
      <button id="pvp-back" type="button" class="pvp-back">메뉴로</button>
    </div>

    <div id="duo-lobby" class="overlay-screen hidden">
      <h2>2v2 대전 <span class="hint">(팀원과 보드를 나눠 쓰는 합체 보드 모드)</span></h2>
      <label>
        서버 주소
        <input type="text" id="duo-server-url" />
      </label>
      <div class="lobby-section">
        <button id="duo-create" type="button">방 만들기</button>
        <p id="duo-room-code"></p>
      </div>
      <div class="lobby-section lobby-join">
        <input type="text" id="duo-code-input" placeholder="방 코드 입력" maxlength="5" />
        <button id="duo-join" type="button">참가하기</button>
      </div>
      <p id="duo-status" class="pvp-status"></p>
      <button id="duo-back" type="button" class="pvp-back">메뉴로</button>
    </div>

    <div id="pvp-result" class="overlay-screen hidden">
      <h2 id="pvp-result-text"></h2>
      <button id="pvp-result-menu" type="button">메뉴로</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
